<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4B0082"/>
      <stop offset="50%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#4B0082"/>
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  
  <!-- Background rectangle -->
  <rect width="1200" height="200" fill="url(#bgGrad)"/>
  
  <!-- Border -->
  <rect x="10" y="10" width="1180" height="180" rx="30" fill="none" stroke="#FFD700" stroke-width="4"/>
  
  <!-- Welcome text -->
  <text x="600" y="80" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" fill="white">
    WELCOME
  </text>
  
  <!-- MBOKA TECH text -->
  <text x="600" y="140" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="72" font-weight="bold" fill="url(#textGrad)">
    MBOKA TECH
  </text>
</svg>
